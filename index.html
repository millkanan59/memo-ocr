<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモOCR — AIメモ変換ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --bg2: #ECEAE4;
    --surface: #FFFFFF;
    --border: #D8D5CE;
    --border2: #C8C5BC;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #9B9890;
    --accent: #2D4A3E;
    --accent2: #4A7C6A;
    --accent-light: #E8F0EC;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── header ── */
  header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 15px; font-weight: 500;
    color: var(--accent); letter-spacing: -0.01em;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .api-area { display: flex; align-items: center; gap: 8px; }
  .api-input {
    font-family: var(--mono); font-size: 12px;
    padding: 7px 12px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    width: 240px;
    outline: none;
    transition: border-color 0.15s;
  }
  .api-input:focus { border-color: var(--accent2); }
  .api-input::placeholder { color: var(--text3); }
  .api-status {
    font-family: var(--mono); font-size: 11px;
    color: var(--text3);
  }
  .api-status.ok { color: var(--accent2); }

  /* ── main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 32px;
    gap: 24px;
  }

  /* ── left panel ── */
  .left { display: flex; flex-direction: column; gap: 16px; }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .drop-zone:hover { border-color: var(--accent2); background: var(--accent-light); }
  .drop-zone.dragging { border-color: var(--accent); background: var(--accent-light); }
  .drop-zone.has-image { padding: 12px; }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    font-size: 32px; margin-bottom: 10px; color: var(--text3);
    transition: transform 0.2s;
  }
  .drop-zone:hover .drop-icon { transform: translateY(-2px); }
  .drop-label { font-size: 14px; color: var(--text2); font-weight: 500; }
  .drop-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .preview-img {
    max-width: 100%; max-height: 240px; border-radius: var(--radius);
    object-fit: contain; display: block; margin: 0 auto;
  }

  /* ── card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .card-title {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── format buttons ── */
  .fmt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .fmt-btn {
    padding: 10px 12px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 13px; font-family: var(--sans);
    color: var(--text2); cursor: pointer;
    text-align: left; display: flex; align-items: center; gap: 8px;
    transition: all 0.12s;
  }
  .fmt-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .fmt-btn.on {
    background: var(--accent-light);
    border-color: var(--accent2);
    color: var(--accent);
  }
  .fmt-icon { font-size: 16px; }

  /* ── hints ── */
  .hint-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .hint-chip {
    font-size: 12px; padding: 5px 11px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2); cursor: pointer; font-family: var(--sans);
    transition: all 0.1s;
  }
  .hint-chip:hover { border-color: var(--accent2); }
  .hint-chip.on { background: var(--accent-light); border-color: var(--accent2); color: var(--accent); }
  .extra-input {
    width: 100%; padding: 9px 12px; font-size: 13px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: var(--sans);
    outline: none; transition: border-color 0.15s; margin-top: 8px;
  }
  .extra-input:focus { border-color: var(--accent2); }
  .extra-input::placeholder { color: var(--text3); }

  /* ── run button ── */
  .run-btn {
    width: 100%; padding: 13px;
    border-radius: var(--radius);
    border: none; cursor: pointer;
    font-size: 14px; font-weight: 700;
    font-family: var(--sans);
    background: var(--accent);
    color: #fff;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
  }
  .run-btn:hover:not(:disabled) { background: var(--accent2); }
  .run-btn:active:not(:disabled) { transform: scale(0.98); }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── progress ── */
  .prog { height: 2px; background: var(--bg2); border-radius: 2px; overflow: hidden; margin-top: 10px; display: none; }
  .prog-fill { height: 100%; width: 0; background: var(--accent2); transition: width 0.3s ease; }
  .status-text { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 8px; min-height: 16px; }

  /* ── right panel ── */
  .right { display: flex; flex-direction: column; gap: 0; }
  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    flex: 1;
    display: flex; flex-direction: column;
    min-height: 500px;
    overflow: hidden;
  }
  .result-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .result-label {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .result-actions { display: flex; gap: 6px; }
  .icon-btn {
    padding: 5px 10px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent; cursor: pointer;
    font-size: 12px; font-family: var(--mono);
    color: var(--text2); transition: all 0.1s;
  }
  .icon-btn:hover { border-color: var(--accent2); color: var(--accent); }

  .result-body {
    flex: 1; padding: 24px;
    overflow-y: auto;
  }
  .result-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--text3);
    font-size: 13px; font-family: var(--mono);
    gap: 8px;
  }
  .result-empty-icon { font-size: 32px; opacity: 0.4; }

  .result-pre {
    font-family: var(--mono); font-size: 13px;
    line-height: 1.8; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }

  /* mindmap svg */
  .mindmap-wrap { width: 100%; overflow-x: auto; }

  /* table */
  .result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .result-table th {
    text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 500; color: var(--text2);
    font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .result-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    color: var(--text); vertical-align: top;
  }

  /* ── footer ── */
  footer {
    text-align: center; padding: 16px;
    font-size: 11px; font-family: var(--mono);
    color: var(--text3);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent2); text-decoration: none; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; padding: 16px; }
    header { padding: 16px; flex-direction: column; gap: 10px; align-items: flex-start; }
    .api-input { width: 100%; }
    .api-area { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    メモOCR
  </div>
 <a href="study-app.html" style="font-size:13px;color:#534AB7;text-decoration:none;font-family:monospace;padding:6px 12px;border:1px solid #534AB7;border-radius:8px;">学習アプリへ →</a>
  <div class="api-area">
    <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-... APIキーを入力">
    <span class="api-status" id="apiStatus">未設定</span>
  </div>
</header>

<main>
  <!-- left -->
  <div class="left">
    <div class="drop-zone" id="dz">
      <input type="file" id="fi" accept="image/jpeg,image/png,image/gif,image/webp">
      <div id="dzInner">
        <div class="drop-icon">📷</div>
        <div class="drop-label">画像をドロップ or クリック</div>
        <div class="drop-sub">手書き・ホワイトボード・付箋・印刷物<br>jpg / png / gif / webp</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">出力フォーマット</div>
      <div class="fmt-grid" id="fmtRow">
        <button class="fmt-btn on" data-fmt="mindmap" type="button"><span class="fmt-icon">🗺</span>マインドマップ</button>
        <button class="fmt-btn" data-fmt="text" type="button"><span class="fmt-icon">📝</span>テキスト整形</button>
        <button class="fmt-btn" data-fmt="list" type="button"><span class="fmt-icon">📋</span>箇条書き</button>
        <button class="fmt-btn" data-fmt="table" type="button"><span class="fmt-icon">📊</span>表形式</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">追加指示（任意）</div>
      <div class="hint-wrap" id="hintRow">
        <span class="hint-chip" data-hint="要点だけまとめて">要点だけ</span>
        <span class="hint-chip" data-hint="日本語に統一">日本語に統一</span>
        <span class="hint-chip" data-hint="英語に翻訳">英語に翻訳</span>
        <span class="hint-chip" data-hint="アクションアイテムを抽出">アクション抽出</span>
        <span class="hint-chip" data-hint="タグを付けて整理">タグ整理</span>
      </div>
      <input class="extra-input" id="extraInput" type="text" placeholder="自由に追加指示を入力…">
    </div>

    <button class="run-btn" id="runBtn" disabled type="button">AIで変換する</button>
    <div class="prog" id="prog"><div class="prog-fill" id="progFill"></div></div>
    <div class="status-text" id="statusText"></div>
  </div>

  <!-- right -->
  <div class="right">
    <div class="result-box">
      <div class="result-header">
        <span class="result-label" id="resultLabel">結果</span>
        <div class="result-actions">
          <button class="icon-btn" id="copyBtn" type="button" style="display:none">コピー</button>
          <button class="icon-btn" id="dlBtn" type="button" style="display:none">ダウンロード</button>
        </div>
      </div>
      <div class="result-body" id="resultBody">
        <div class="result-empty" id="emptyState">
          <div class="result-empty-icon">✦</div>
          <div>画像を選んで変換ボタンを押してください</div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  メモOCR — Anthropic Claude API を使用 ·
  APIキーは <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得できます ·
  キーはブラウザ内のみで使用され、外部には送信されません
</footer>

<script>
(function(){
  var b64 = null;
  var mtype = 'image/jpeg';
  var fmt = 'mindmap';
  var hints = [];
  var lastRaw = '';
  var lastFmt = '';

  var apiKeyInput = document.getElementById('apiKey');
  var apiStatus = document.getElementById('apiStatus');
  var dz = document.getElementById('dz');
  var fi = document.getElementById('fi');
  var dzInner = document.getElementById('dzInner');
  var runBtn = document.getElementById('runBtn');
  var prog = document.getElementById('prog');
  var progFill = document.getElementById('progFill');
  var statusText = document.getElementById('statusText');
  var resultBody = document.getElementById('resultBody');
  var resultLabel = document.getElementById('resultLabel');
  var copyBtn = document.getElementById('copyBtn');
  var dlBtn = document.getElementById('dlBtn');
  var emptyState = document.getElementById('emptyState');

  // API key
  var savedKey = localStorage.getItem('memo_ocr_api_key');
  if(savedKey) { apiKeyInput.value = savedKey; updateApiStatus(); }
  apiKeyInput.addEventListener('input', function(){
    localStorage.setItem('memo_ocr_api_key', apiKeyInput.value.trim());
    updateApiStatus();
    checkRunnable();
  });
  function updateApiStatus(){
    var k = apiKeyInput.value.trim();
    if(k.startsWith('sk-ant-') && k.length > 20){
      apiStatus.textContent = '設定済み ✓'; apiStatus.className = 'api-status ok';
    } else if(k.length > 0) {
      apiStatus.textContent = '形式が違うかも'; apiStatus.className = 'api-status';
    } else {
      apiStatus.textContent = '未設定'; apiStatus.className = 'api-status';
    }
  }

  // File
  fi.addEventListener('change', function(e){ if(e.target.files && e.target.files[0]) readFile(e.target.files[0]); });
  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('dragging'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('dragging'); });
  dz.addEventListener('drop', function(e){
    e.preventDefault(); dz.classList.remove('dragging');
    if(e.dataTransfer.files && e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  function readFile(file){
    mtype = file.type || 'image/jpeg';
    var r = new FileReader();
    r.onload = function(ev){
      b64 = ev.target.result.split(',')[1];
      dz.classList.add('has-image');
      dzInner.innerHTML = '<img class="preview-img" src="' + ev.target.result + '" alt="プレビュー">';
      statusText.textContent = '画像を読み込みました';
      checkRunnable();
    };
    r.readAsDataURL(file);
  }

  function checkRunnable(){
    var k = apiKeyInput.value.trim();
    runBtn.disabled = !(b64 && k.length > 10);
  }

  // Format
  document.getElementById('fmtRow').addEventListener('click', function(e){
    var btn = e.target.closest('.fmt-btn');
    if(!btn) return;
    document.querySelectorAll('.fmt-btn').forEach(function(b){ b.classList.remove('on'); });
    btn.classList.add('on');
    fmt = btn.getAttribute('data-fmt');
  });

  // Hints
  document.getElementById('hintRow').addEventListener('click', function(e){
    var chip = e.target.closest('.hint-chip');
    if(!chip) return;
    var h = chip.getAttribute('data-hint');
    if(chip.classList.contains('on')){
      chip.classList.remove('on');
      hints = hints.filter(function(x){ return x !== h; });
    } else {
      chip.classList.add('on');
      hints.push(h);
    }
  });

  // Run
  runBtn.addEventListener('click', function(){
    var apiKey = apiKeyInput.value.trim();
    if(!b64 || !apiKey) return;
    doConvert(apiKey);
  });

  function doConvert(apiKey){
    runBtn.disabled = true;
    prog.style.display = 'block';
    progFill.style.width = '0%';
    emptyState && (emptyState.style.display = 'none');
    resultBody.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:13px;padding:8px 0">解析中…</div>';
    copyBtn.style.display = 'none';
    dlBtn.style.display = 'none';

    var iv = setInterval(function(){
      var cur = parseFloat(progFill.style.width)||0;
      progFill.style.width = Math.min(cur + Math.random()*12, 88) + '%';
    }, 350);

    var extra = document.getElementById('extraInput').value.trim();
    var allHints = hints.slice();
    if(extra) allHints.push(extra);

    var fmtMap = {
      mindmap: 'メモの内容をマインドマップ構造でJSONにまとめてください。形式: {"root":"中心トピック","children":[{"label":"子トピック","children":[{"label":"孫トピック"}]}]}。JSONのみ返してください。コードブロック不要。',
      text: 'メモの内容を整形したテキストで出力してください。見出しや段落を使って読みやすくしてください。プレーンテキストのみ返してください。',
      list: 'メモの内容を箇条書きリストにしてください。マークダウン記法（- や  - ）で返してください。',
      table: 'メモの内容を表形式でJSON配列にしてください。形式: [{"項目":"...","内容":"..."},...] JSONのみ返してください。'
    };

    var prompt = 'この画像はメモ（手書き・ホワイトボード・付箋・印刷物）です。\nOCRでテキストを認識し、以下の指示で出力してください。\n\n' +
      fmtMap[fmt] +
      (allHints.length ? '\n\n追加指示: ' + allHints.join('、') : '') +
      '\n\n日本語を優先してください。';

    statusText.textContent = 'AIが解析中…';

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mtype, data: b64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    })
    .then(function(res){
      if(!res.ok) return res.json().then(function(e){ throw new Error(e.error && e.error.message || 'APIエラー ' + res.status); });
      return res.json();
    })
    .then(function(data){
      clearInterval(iv);
      progFill.style.width = '100%';
      setTimeout(function(){ prog.style.display = 'none'; }, 400);
      var raw = (data.content||[]).map(function(c){ return c.text||''; }).join('');
      lastRaw = raw; lastFmt = fmt;
      statusText.textContent = '変換完了！';
      renderResult(fmt, raw);
      runBtn.disabled = false;
      copyBtn.style.display = '';
      dlBtn.style.display = '';
    })
    .catch(function(err){
      clearInterval(iv);
      prog.style.display = 'none';
      statusText.textContent = 'エラー: ' + err.message;
      resultBody.innerHTML = '<div style="color:#A32D2D;font-family:var(--mono);font-size:13px">' + esc(err.message) + '</div>';
      runBtn.disabled = false;
    });
  }

  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderResult(f, raw){
    var fmtNames = {mindmap:'マインドマップ',text:'テキスト整形',list:'箇条書き',table:'表形式'};
    resultLabel.textContent = '結果 — ' + fmtNames[f];

    if(f === 'mindmap'){
      try {
        var clean = raw.replace(/```json|```/g,'').trim();
        var parsed = JSON.parse(clean);
        resultBody.innerHTML = '<div class="mindmap-wrap">' + buildMindMap(parsed) + '</div>';
      } catch(e) {
        resultBody.innerHTML = '<pre class="result-pre">' + esc(raw) + '</pre>';
      }
    } else if(f === 'table'){
      try {
        var clean2 = raw.replace(/```json|```/g,'').trim();
        var arr = JSON.parse(clean2);
        resultBody.innerHTML = buildTable(arr);
      } catch(e) {
        resultBody.innerHTML = '<pre class="result-pre">' + esc(raw) + '</pre>';
      }
    } else {
      resultBody.innerHTML = '<pre class="result-pre">' + esc(raw) + '</pre>';
    }
  }

  function buildTable(arr){
    if(!arr||!arr.length) return '<p style="color:var(--text3);font-size:13px">データなし</p>';
    var keys = Object.keys(arr[0]);
    var h = '<table class="result-table"><thead><tr>' +
      keys.map(function(k){ return '<th>' + esc(k) + '</th>'; }).join('') + '</tr></thead><tbody>';
    arr.forEach(function(row){
      h += '<tr>' + keys.map(function(k){ return '<td>' + esc(String(row[k]||'')); + '</td>'; }).join('') + '</tr>';
    });
    return h + '</tbody></table>';
  }

  function buildMindMap(node){
    var W=640, H=360, rootX=80, rootY=H/2, rootR=50;
    var children = node.children||[];
    var n = Math.max(children.length,1);
    var childX=260;
    var cols=['#2D4A3E','#4A5568','#744210','#1A365D','#276749'];
    var fills=['#E8F0EC','#EDF2F7','#FEFCBF','#EBF8FF','#F0FFF4'];
    var txts=['#1C3829','#2D3748','#5F370E','#0D2B4E','#14532D'];
    var parts=[];
    children.forEach(function(child,i){
      var cy=(H/n)*i+(H/n)/2;
      var col=cols[i%cols.length], fill=fills[i%fills.length], txt=txts[i%txts.length];
      var subs=child.children||[];
      var subX=430;
      parts.push('<line x1="'+(rootX+rootR)+'" y1="'+rootY+'" x2="'+childX+'" y2="'+cy+'" stroke="'+col+'" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>');
      var lbl=(child.label||'').slice(0,14);
      parts.push('<rect x="'+childX+'" y="'+(cy-15)+'" width="140" height="30" rx="15" fill="'+fill+'" stroke="'+col+'" stroke-width="1"/>');
      parts.push('<text x="'+(childX+70)+'" y="'+(cy+5)+'" text-anchor="middle" font-size="12" fill="'+txt+'" font-family="Noto Sans JP,sans-serif">'+esc(lbl)+'</text>');
      subs.forEach(function(s,j){
        var sy=cy+(j-(subs.length-1)/2)*34;
        var slbl=(s.label||'').slice(0,11);
        parts.push('<line x1="'+(childX+140)+'" y1="'+cy+'" x2="'+subX+'" y2="'+sy+'" stroke="'+col+'" stroke-width="0.8" opacity="0.4"/>');
        parts.push('<rect x="'+subX+'" y="'+(sy-12)+'" width="110" height="24" rx="12" fill="'+fill+'" stroke="'+col+'" stroke-width="0.5" opacity="0.9"/>');
        parts.push('<text x="'+(subX+55)+'" y="'+(sy+4)+'" text-anchor="middle" font-size="11" fill="'+txt+'" font-family="Noto Sans JP,sans-serif">'+esc(slbl)+'</text>');
      });
    });
    var rlbl=(node.root||'').slice(0,8);
    parts.push('<circle cx="'+rootX+'" cy="'+rootY+'" r="'+rootR+'" fill="#2D4A3E"/>');
    parts.push('<text x="'+rootX+'" y="'+rootY+'" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#E8F0EC" font-weight="500" font-family="Noto Sans JP,sans-serif">'+esc(rlbl)+'</text>');
    return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:520px">'+parts.join('')+'</svg>';
  }

  // Copy
  copyBtn.addEventListener('click', function(){
    var text = lastFmt==='mindmap'||lastFmt==='table' ? lastRaw : (resultBody.querySelector('.result-pre')||{textContent:lastRaw}).textContent;
    navigator.clipboard.writeText(lastRaw).then(function(){
      copyBtn.textContent = 'コピー済 ✓';
      setTimeout(function(){ copyBtn.textContent = 'コピー'; }, 1500);
    });
  });

  // Download
  dlBtn.addEventListener('click', function(){
    var ext = {mindmap:'json', text:'txt', list:'md', table:'json'}[lastFmt]||'txt';
    var blob = new Blob([lastRaw], {type:'text/plain'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'memo-ocr-result.' + ext;
    a.click();
  });

})();
</script>
</body>
</html>
